<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset='utf-8' />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的全能日程 & 任务站</title>
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
  <style>
    :root { --course-bg: #e7f5ff; --prof-bg: #ebfbee; --user-bg: #fff4e6; --text: #000000; }
    body { font-family: sans-serif; margin: 0; background: #f1f3f5; color: #333; padding-bottom: 50px; }
    #calendar { max-width: 1100px; margin: 10px auto; background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    
    /* 任务看板样式 */
    .task-container { max-width: 1100px; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; padding: 0 10px; }
    .task-card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #3b82f6; }
    .task-card.research { border-top-color: #22c55e; } /* 科研类绿色 */
    .task-card h3 { margin-top: 0; font-size: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    
    .task-item { display: flex; align-items: center; margin: 8px 0; gap: 8px; }
    .task-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    .task-item input[type="text"] { flex: 1; border: none; border-bottom: 1px solid transparent; outline: none; padding: 2px; }
    .task-item input[type="text"]:focus { border-bottom: 1px solid #ddd; }
    .task-item.completed input[type="text"] { text-decoration: line-through; color: #888; }
    
    .add-task-btn { background: #f0f0f0; border: none; width: 100%; padding: 5px; border-radius: 4px; cursor: pointer; font-size: 12px; color: #666; transition: 0.2s; }
    .add-task-btn:hover { background: #e0e0e0; }
    .del-task { color: #ff8787; cursor: pointer; font-size: 12px; display: none; }
    .task-item:hover .del-task { display: block; }

    /* 日历事件样式 */
    .fc-event-title, .fc-event-time { color: var(--text) !important; font-weight: bold !important; }
    .event-school { border-left: 4px solid #3b82f6 !important; background: var(--course-bg) !important; }
    .event-prof { border-left: 4px solid #22c55e !important; background: var(--prof-bg) !important; }
    .event-user { border-left: 4px solid #f97316 !important; background: var(--user-bg) !important; }
  </style>
</head>
<body>

  <div id='calendar'></div>

  <div style="max-width:1100px; margin: 30px auto 10px; padding: 0 15px;">
    <h2 style="font-size: 20px;">📌 课程任务看板</h2>
  </div>

  <div class="task-container" id="taskBoard">
    </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // --- 日历部分 (保留之前所有功能) ---
      var calendarEl = document.getElementById('calendar');
      let storedEvents = JSON.parse(localStorage.getItem('my_flexible_calendar_v_final_fixed'));
      if (!storedEvents) {
        storedEvents = [];
        const startDay = new Date('2026-03-09');
        const baseCourses = [
            { t: '1207\n创业管理', d: 1, s: '10:20', e: '11:50' },
            { t: '1201\n管理研究与论文写作', d: 1, s: '14:00', e: '15:30' },
            { t: '1202\n审辨式思维', d: 1, s: '15:50', e: '17:20' },
            { t: '1201\n组织理论', d: 2, s: '14:00', e: '15:30' },
            { t: '操场\n乒乓球', d: 3, s: '08:30', e: '10:00' },
            { t: '1203\n消费者行为学', d: 3, s: '14:00', e: '15:30' },
            { t: '1201\n领导学', d: 4, s: '10:20', e: '11:50' }
        ];
        for (let i = 0; i < 16; i++) {
          baseCourses.forEach(bc => {
            let date = new Date(startDay);
            date.setDate(startDay.getDate() + (i * 7) + (bc.d - 1));
            storedEvents.push({ id: 'c_'+Math.random(), title: bc.t, start: date.toISOString().split('T')[0]+'T'+bc.s+':00', end: date.toISOString().split('T')[0]+'T'+bc.e+':00', className: 'event-school' });
          });
        }
        // 教授课
        const profConfigs = [{t:'Online\nTA 1', s:'2026-03-01T19:00', h: 2.25},{t:'Online\nLec 1', s:'2026-03-07T20:15', h: 1.5},{t:'Online\nTA 2', s:'2026-03-14T19:00', h: 2.25},{t:'Online\nLec 2', s:'2026-03-15T20:00', h: 1.5},{t:'Online\nLec 3', s:'2026-03-21T20:15', h: 1.5},{t:'Online\nTA 3', s:'2026-03-28T19:00', h: 2.25},{t:'Online\nLec 4', s:'2026-03-29T20:00', h: 1.5},{t:'Online\nLec 5', s:'2026-04-04T21:00', h: 1.5},{t:'Online\nTA 4', s:'2026-04-05T19:00', h: 2.25},{t:'Online\nTA 5', s:'2026-04-11T19:00', h: 2.25},{t:'Online\nTA 6', s:'2026-04-12T19:00', h: 2.25},{t:'Online\nPre Sem', s:'2026-04-18T21:00', h: 3},{t:'Online\nLec 6', s:'2026-04-19T21:00', h: 1.5},{t:'Online\nPre', s:'2026-04-25T20:15', h: 3}];
        profConfigs.forEach(p => {
          let start = new Date(p.s);
          let end = new Date(start.getTime() + p.h * 60 * 60 * 1000);
          storedEvents.push({ id: 'p_'+Math.random(), title: p.t, start: p.s+':00', end: end.toISOString().replace(/\.\d+Z$/, ''), className: 'event-prof' });
        });
        localStorage.setItem('my_flexible_calendar_v_final_fixed', JSON.stringify(storedEvents));
      }

      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek', initialDate: '2026-03-01', locale: 'zh-cn', allDaySlot: false, slotMinTime: '08:00', slotMaxTime: '23:30', editable: true, selectable: true,
        headerToolbar: { left: 'prev,next today', center: 'title', right: 'timeGridWeek,dayGridMonth' },
        events: storedEvents,
        save: function() {
          const all = calendar.getEvents().map(e => ({ id:e.id, title:e.title, start:e.startStr, end:e.endStr, className:e.classNames[0] }));
          localStorage.setItem('my_flexible_calendar_v_final_fixed', JSON.stringify(all));
        },
        select: function(info) {
          var title = prompt('输入计划:');
          if (title) { calendar.addEvent({ id:'u_'+Date.now(), title:'📌 '+title, start:info.startStr, end:info.endStr, className:'event-user' }); this.save(); }
          calendar.unselect();
        },
        eventDrop: function() { this.save(); },
        eventResize: function() { this.save(); },
        eventClick: function(info) {
          var action = prompt('修改或输入 "del" 删除:', info.event.title);
          if (action === "del") { info.event.remove(); this.save(); }
          else if (action && action !== info.event.title) { info.event.setProp('title', action); this.save(); }
        }
      });
      calendar.render();

      // --- 任务看板部分 ---
      const categories = [
        { id: 'research', name: '🧪 科研大类 (教授课)', colorClass: 'research' },
        { id: 'entre', name: '创业管理' },
        { id: 'paper', name: '论文写作' },
        { id: 'thinking', name: '审辨式思维' },
        { id: 'org', name: '组织理论' },
        { id: 'pingpong', name: '乒乓球' },
        { id: 'consumer', name: '消费者行为学' },
        { id: 'leader', name: '领导学' }
      ];

      let taskData = JSON.parse(localStorage.getItem('my_task_data')) || {};

      function renderTasks() {
        const board = document.getElementById('taskBoard');
        board.innerHTML = '';
        categories.forEach(cat => {
          const card = document.createElement('div');
          card.className = `task-card ${cat.colorClass || ''}`;
          card.innerHTML = `<h3>${cat.name}</h3><div id="list-${cat.id}"></div><button class="add-task-btn" onclick="addTask('${cat.id}')">+ 添加任务</button>`;
          board.appendChild(card);
          
          const list = taskData[cat.id] || [];
          const listEl = document.getElementById(`list-${cat.id}`);
          list.forEach((task, index) => {
            const item = document.createElement('div');
            item.className = `task-item ${task.done ? 'completed' : ''}`;
            item.innerHTML = `
              <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${cat.id}', ${index})">
              <input type="text" value="${task.text}" onchange="editTask('${cat.id}', ${index}, this.value)">
              <span class="del-task" onclick="delTask('${cat.id}', ${index})">✕</span>
            `;
            listEl.appendChild(item);
          });
        });
      }

      window.addTask = function(catId) {
        if (!taskData[catId]) taskData[catId] = [];
        taskData[catId].push({ text: '', done: false });
        saveTasks();
      };

      window.toggleTask = function(catId, index) {
        taskData[catId][index].done = !taskData[catId][index].done;
        saveTasks();
      };

      window.editTask = function(catId, index, newText) {
        taskData[catId][index].text = newText;
        saveTasks();
      };

      window.delTask = function(catId, index) {
        taskData[catId].splice(index, 1);
        saveTasks();
      };

      function saveTasks() {
        localStorage.setItem('my_task_data', JSON.stringify(taskData));
        renderTasks();
      }

      renderTasks();
    });
  </script>
</body>

</html>
